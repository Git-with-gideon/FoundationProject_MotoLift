<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoLift</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        width: 100%;
        max-width: 400px;
      }
      .logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .logo h1 {
        font-size: 24px;
        font-weight: 700;
        color: #1a1a2e;
        letter-spacing: -0.5px;
      }
      .logo p {
        font-size: 13px;
        color: #6b7280;
        margin-top: 4px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
      }
      .tabs {
        display: flex;
        border-bottom: 1px solid #e5e7eb;
      }
      .tab {
        flex: 1;
        padding: 14px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
        cursor: pointer;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }
      .tab.active {
        color: #1a1a2e;
        border-bottom-color: #1a1a2e;
      }
      .tab:hover {
        color: #1a1a2e;
      }
      .panel {
        display: none;
        padding: 28px 24px;
      }
      .panel.active {
        display: block;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }
      .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        color: #1a1a2e;
        background: #fff;
        outline: none;
        transition: border 0.2s;
      }
      .form-group input:focus {
        border-color: #374151;
      }
      .form-group input::placeholder {
        color: #9ca3af;
      }
      .submit-btn {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-dark {
        background: #1a1a2e;
        color: #fff;
      }
      .btn-dark:hover {
        background: #2d2d44;
      }
      .error-msg {
        font-size: 12px;
        color: #dc2626;
        text-align: center;
        margin-top: 12px;
        display: none;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        font-size: 11px;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e5e7eb;
      }
      .role-hint {
        font-size: 12px;
        color: #6b7280;
        text-align: center;
        margin-top: 16px;
        line-height: 1.6;
      }
      @media (max-width: 440px) {
        .panel {
          padding: 24px 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <h1>MotoLift</h1>
        <p>Rent-to-own platform for moto drivers</p>
      </div>

      <div class="card">
        <div class="tabs">
          <button class="tab active" data-tab="login">Sign In</button>
          <button class="tab" data-tab="register">Register as Owner</button>
        </div>

        <!-- LOGIN -->
        <div class="panel active" id="panel-login">
          <form id="loginForm">
            <div class="form-group">
              <label>Phone Number</label>
              <input
                type="tel"
                id="loginPhone"
                placeholder="+250 7XX XXX XXX"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="loginPass"
                placeholder="Enter password"
                required
              />
            </div>
            <button type="submit" class="submit-btn btn-dark">Sign In</button>
            <p class="error-msg" id="loginError"></p>
          </form>
          <p class="role-hint">
            Admins and Owners sign in here.<br />Drivers use USSD (*384#).
          </p>
        </div>

        <!-- REGISTER -->
        <div class="panel" id="panel-register">
          <form id="registerForm">
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                id="regName"
                placeholder="Your full name"
                required
              />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input
                type="tel"
                id="regPhone"
                placeholder="+250 7XX XXX XXX"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                id="regPass"
                placeholder="At least 6 characters"
                required
              />
            </div>
            <div class="form-group">
              <label>Confirm Password</label>
              <input
                type="password"
                id="regPassConfirm"
                placeholder="Confirm password"
                required
              />
            </div>
            <button type="submit" class="submit-btn btn-dark">
              Create Account
            </button>
            <p class="error-msg" id="regError"></p>
          </form>
          <p class="role-hint">
            Register as a motorcycle owner to track<br />your fleet and driver
            payments.
          </p>
        </div>
      </div>
    </div>

    <script>
      const existingToken = localStorage.getItem("ml_token");
      if (existingToken) {
        const role = localStorage.getItem("ml_role");
        window.location.href =
          role === "OWNER" ? "owner.html" : "dashboard.html";
      }

      // Tabs
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".panel")
            .forEach((p) => p.classList.remove("active"));
          tab.classList.add("active");
          document
            .getElementById("panel-" + tab.dataset.tab)
            .classList.add("active");
        });
      });

      // Login
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const err = document.getElementById("loginError");
          err.style.display = "none";

          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                phone: document.getElementById("loginPhone").value.trim(),
                password: document.getElementById("loginPass").value,
              }),
            });
            const data = await res.json();
            if (res.ok) {
              localStorage.setItem("ml_token", data.token);
              localStorage.setItem("ml_role", data.role);
              localStorage.setItem("ml_name", data.name);
              window.location.href =
                data.role === "OWNER" ? "owner.html" : "dashboard.html";
              return;
            }
            err.textContent = data.error || "Invalid credentials";
            err.style.display = "block";
          } catch {
            err.textContent = "Could not connect to server.";
            err.style.display = "block";
          }
        });

      // Register
      document
        .getElementById("registerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const err = document.getElementById("regError");
          err.style.display = "none";

          const pw = document.getElementById("regPass").value;
          if (pw !== document.getElementById("regPassConfirm").value) {
            err.textContent = "Passwords do not match.";
            err.style.display = "block";
            return;
          }

          try {
            const res = await fetch("/api/auth/register-owner", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: document.getElementById("regName").value.trim(),
                phone: document.getElementById("regPhone").value.trim(),
                password: pw,
              }),
            });
            const data = await res.json();
            if (res.ok) {
              localStorage.setItem("ml_token", data.token);
              localStorage.setItem("ml_role", data.role);
              localStorage.setItem("ml_name", data.name);
              window.location.href = "owner.html";
              return;
            }
            err.textContent = data.error || "Registration failed.";
            err.style.display = "block";
          } catch {
            err.textContent = "Could not connect to server.";
            err.style.display = "block";
          }
        });
    </script>
  </body>
</html>
