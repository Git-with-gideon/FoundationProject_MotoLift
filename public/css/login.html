<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoLift — Login</title>
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">
        <div class="login-logo">
          <h1>MotoLift</h1>
          <p>Admin Dashboard</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              placeholder="+250 7XX XXX XXX"
              autocomplete="tel"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center"
          >
            Sign in
          </button>
          <p class="form-error" id="loginError" style="display: none"></p>
        </form>
      </div>
    </div>

    <script>
      if (localStorage.getItem("ml_token")) {
        window.location.href = "dashboard.html";
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const errorEl = document.getElementById("loginError");
          errorEl.style.display = "none";

          const phone = document.getElementById("phone").value.trim();
          const password = document.getElementById("password").value;

          // Try real API
          try {
            const res = await fetch("/api/auth/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ phone, password }),
            });
            if (res.ok) {
              const data = await res.json();
              localStorage.setItem("ml_token", data.token);
              localStorage.setItem("ml_role", data.role);
              localStorage.setItem("ml_name", data.name || phone);
              window.location.href = "dashboard.html";
              return;
            }
          } catch {
            /* no server — fall through to demo mode */
          }

          // Demo mode: any credentials work
          localStorage.setItem("ml_token", "demo");
          localStorage.setItem("ml_role", "ADMIN");
          localStorage.setItem("ml_name", phone);
          window.location.href = "dashboard.html";
        });
    </script>
  </body>
</html>
