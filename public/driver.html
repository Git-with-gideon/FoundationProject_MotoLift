<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MotoLift — Driver Profile</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #1a1a2e;
        font-size: 14px;
        line-height: 1.5;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        cursor: pointer;
        font: inherit;
      }
      .header {
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 0 20px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .hdr-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .hdr-left h1 {
        font-size: 16px;
        font-weight: 700;
      }
      .hdr-left small {
        font-size: 12px;
        color: #6b7280;
      }
      .hdr-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sign-out {
        font-size: 12px;
        color: #6b7280;
        border: none;
        background: none;
      }
      .sign-out:hover {
        color: #dc2626;
      }
      .content {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px 20px;
      }
      .back {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 20px;
      }
      .back:hover {
        color: #1a1a2e;
      }
      .profile {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }
      .avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: #1a1a2e;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .profile-info h2 {
        font-size: 17px;
        font-weight: 700;
      }
      .profile-info p {
        font-size: 13px;
        color: #6b7280;
        margin-top: 2px;
      }
      .profile-meta {
        margin-left: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
      }
      .b {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
      }
      .b-green {
        background: #ecfdf5;
        color: #065f46;
      }
      .b-yellow {
        background: #fffbeb;
        color: #92400e;
      }
      .b-red {
        background: #fef2f2;
        color: #991b1b;
      }
      .b-gray {
        background: #f3f4f6;
        color: #374151;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 20px;
      }
      .card-head {
        padding: 14px 18px;
        border-bottom: 1px solid #e5e7eb;
        font-size: 14px;
        font-weight: 600;
      }
      .card-body {
        padding: 18px;
      }
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .detail-item label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: #6b7280;
        margin-bottom: 2px;
        display: block;
      }
      .detail-item p {
        font-size: 13px;
        font-weight: 500;
      }
      .prog {
        height: 8px;
        background: #e5e7eb;
        border-radius: 99px;
        overflow: hidden;
        margin: 10px 0;
      }
      .prog-fill {
        height: 100%;
        background: #1a1a2e;
        border-radius: 99px;
      }
      .own-labels {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
      }
      .own-pct {
        font-weight: 700;
        color: #1a1a2e;
      }
      .own-footer {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #6b7280;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        text-align: left;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        color: #6b7280;
        padding: 10px 14px;
        border-bottom: 1px solid #e5e7eb;
        white-space: nowrap;
      }
      td {
        padding: 11px 14px;
        border-bottom: 1px solid #f3f4f6;
        font-size: 13px;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #fafbfc;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 18px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid #d1d5db;
        background: #fff;
        color: #374151;
        transition: background 0.15s;
      }
      .btn:hover {
        background: #f3f4f6;
      }
      .btn-fill {
        background: #1a1a2e;
        color: #fff;
        border-color: #1a1a2e;
      }
      .btn-fill:hover {
        background: #2d2d44;
      }
      .btn-del {
        color: #dc2626;
        border-color: #fca5a5;
      }
      .btn-del:hover {
        background: #fef2f2;
      }
      .empty {
        text-align: center;
        padding: 32px;
        color: #9ca3af;
        font-size: 13px;
      }
      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .profile {
          flex-wrap: wrap;
        }
        .profile-meta {
          margin-left: 0;
          align-items: flex-start;
          margin-top: 8px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="hdr-left">
        <h1>MotoLift</h1>
        <small>Admin</small>
      </div>
      <div class="hdr-right">
        <button class="sign-out" id="logoutBtn">Sign out</button>
      </div>
    </div>

    <div class="content">
      <a href="dashboard.html" class="back">&larr; Back to dashboard</a>

      <div class="profile">
        <div class="avatar" id="dAvatar">—</div>
        <div class="profile-info">
          <h2 id="dName">—</h2>
          <p id="dPhone">—</p>
        </div>
        <div class="profile-meta">
          <span id="dStatus" class="b b-gray">—</span>
          <span style="font-size: 12px; color: #6b7280" id="dSince">—</span>
        </div>
      </div>

      <div class="grid">
        <div>
          <div class="card">
            <div class="card-head">Driver Details</div>
            <div class="card-body">
              <div class="detail-grid">
                <div class="detail-item">
                  <label>National ID</label>
                  <p id="fNid">—</p>
                </div>
                <div class="detail-item">
                  <label>License No.</label>
                  <p id="fLicense">—</p>
                </div>
                <div class="detail-item">
                  <label>Motorcycle</label>
                  <p id="fBike">—</p>
                </div>
                <div class="detail-item">
                  <label>Plate</label>
                  <p id="fPlate">—</p>
                </div>
                <div class="detail-item">
                  <label>Daily Payment</label>
                  <p id="fDaily">—</p>
                </div>
                <div class="detail-item">
                  <label>Total Price</label>
                  <p id="fTotal">—</p>
                </div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-head">Actions</div>
            <div class="actions">
              <button class="btn btn-fill" onclick="updateStatus('ACTIVE')">
                Set Active
              </button>
              <button class="btn btn-del" onclick="updateStatus('SUSPENDED')">
                Suspend
              </button>
              <button class="btn" onclick="doSendSMS()">Send SMS</button>
            </div>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="card-head">Ownership Progress</div>
            <div class="card-body">
              <div class="own-labels">
                <span>Paid to date</span
                ><span class="own-pct" id="oPct">0%</span>
              </div>
              <div class="prog">
                <div class="prog-fill" id="oBar" style="width: 0%"></div>
              </div>
              <div class="own-footer">
                <span>Paid: <strong id="oPaid">—</strong></span
                ><span>Remaining: <strong id="oRem">—</strong></span>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-head">Recent Payments</div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>Method</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody id="payBody">
                  <tr>
                    <td colspan="4" class="empty">Loading...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem("ml_token");
      if (!token) window.location.href = "login.html";
      const H = { Authorization: "Bearer " + token };
      const driverId = new URLSearchParams(location.search).get("id");
      let currentUserId = null;

      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          await fetch("/api/auth/logout", { method: "POST", headers: H });
          localStorage.clear();
          window.location.href = "login.html";
        });

      function fmt(n) {
        return Number(n).toLocaleString() + " RWF";
      }
      function badge(s) {
        const m = {
          ACTIVE: "b-green",
          PENDING: "b-yellow",
          SUSPENDED: "b-red",
          SUCCESS: "b-green",
          FAILED: "b-red",
        };
        return `<span class="b ${m[s] || "b-gray"}">${s}</span>`;
      }

      function render(d) {
        document.title = "MotoLift — " + d.name;
        document.getElementById("dAvatar").textContent =
          d.name[0].toUpperCase();
        document.getElementById("dName").textContent = d.name;
        document.getElementById("dPhone").textContent = d.phone;
        document.getElementById("dStatus").outerHTML = badge(d.status);
        document.getElementById("dSince").textContent = "Since " + d.since;
        document.getElementById("fNid").textContent = d.nationalId;
        document.getElementById("fLicense").textContent = d.license;
        document.getElementById("fBike").textContent = d.bike;
        document.getElementById("fPlate").textContent = d.plate;
        document.getElementById("fDaily").textContent = fmt(d.daily);
        document.getElementById("fTotal").textContent = fmt(d.total);
        const pct = Number(d.pct).toFixed(1);
        document.getElementById("oPct").textContent = pct + "%";
        document.getElementById("oBar").style.width = pct + "%";
        document.getElementById("oPaid").textContent = fmt(d.paid);
        document.getElementById("oRem").textContent = fmt(d.total - d.paid);
        const tb = document.getElementById("payBody");
        if (!d.payments.length) {
          tb.innerHTML =
            '<tr><td colspan="4" class="empty">No payments yet.</td></tr>';
          return;
        }
        tb.innerHTML = d.payments
          .map(
            (p) =>
              `<tr><td style="color:#6b7280">${p.date}</td><td style="font-weight:500">${fmt(p.amount)}</td><td>${p.method}</td><td>${badge(p.status)}</td></tr>`,
          )
          .join("");
      }

      async function load() {
        if (!driverId) {
          window.location.href = "dashboard.html";
          return;
        }
        try {
          const res = await fetch(`/api/drivers/${driverId}`, { headers: H });
          if (!res.ok) throw new Error();
          const d = await res.json();
          currentUserId = d.userId;
          const ag = d.agreements[0];
          render({
            name: d.user.name || d.user.phone,
            phone: d.user.phone,
            status: d.status,
            since: new Date(d.user.createdAt).toLocaleDateString("en-GB", {
              month: "short",
              year: "numeric",
            }),
            nationalId: d.nationalId,
            license: d.licenseNumber,
            bike: ag ? `${ag.motorcycle.make} ${ag.motorcycle.model}` : "—",
            plate: ag?.motorcycle?.plateNumber || "—",
            daily: ag?.dailyPayment || 0,
            total: ag?.totalAmount || 0,
            paid: ag?.escrow[0]?.totalPaid || 0,
            pct: ag?.escrow[0]?.ownershipPercentage || 0,
            payments: (ag?.payments || []).map((p) => ({
              date: p.createdAt?.slice(0, 10),
              amount: p.amount,
              method: p.method,
              status: p.status,
            })),
          });
        } catch {
          document.getElementById("dName").textContent = "Driver not found";
        }
      }

      async function updateStatus(s) {
        const res = await fetch(`/api/drivers/${driverId}/status`, {
          method: "PATCH",
          headers: { ...H, "Content-Type": "application/json" },
          body: JSON.stringify({ status: s }),
        });
        if (res.ok) {
          alert("Status updated to " + s);
          load();
        } else alert("Failed.");
      }

      async function doSendSMS() {
        const msg = prompt("Enter SMS message:");
        if (!msg || !currentUserId) return;
        const res = await fetch("/api/notifications/send", {
          method: "POST",
          headers: { ...H, "Content-Type": "application/json" },
          body: JSON.stringify({ userId: currentUserId, message: msg }),
        });
        if (res.ok) alert("SMS sent.");
        else alert("Failed.");
      }

      load();
    </script>
  </body>
</html>
